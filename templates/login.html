<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema Contable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #ecf0f1; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h3 { color: #2c3e50; font-weight: bold; }
        .btn-login { background: #2c3e50; color: white; width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; border: none; transition: 0.3s; }
        .btn-login:hover { background: #34495e; }
        .form-control { padding: 12px; background: #f8f9fa; border: 1px solid #dee2e6; }
        .form-control:focus { background: white; border-color: #2c3e50; box-shadow: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img src="{{ url_for('static', filename='img/logo_original.png') }}" alt="Logo Sistema" style="width: 120px; margin-bottom: 15px;">
        <h3>🔐 Acceso</h3>
        <p class="text-muted">Sistema Contable Enterprise</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label text-muted">Usuario</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label text-muted">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-login">INGRESAR</button>
    </form>
    <div class="text-center mt-4 pt-3 border-top">
    <p class="text-muted small mb-2">¿Eres un alumno nuevo?</p>
    <a href="{{ url_for('register') }}" class="btn btn-outline-primary w-100 fw-bold">
        CREAR CUENTA
    </a>
</div>
    
    <div class="text-center mt-4">
        <small class="text-muted">Licencia activa en este equipo</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
