<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración Inicial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function toggleCodigo() {
            var rol = document.getElementById("rolSelect").value;
            var divCodigo = document.getElementById("divCodigoMaestro");
            // Solo pedimos código si quiere ser Admin
            if (rol === 'admin') {
                divCodigo.style.display = "block";
                document.getElementById("codigoMaestro").required = true;
            } else {
                divCodigo.style.display = "none";
                document.getElementById("codigoMaestro").required = false;
            }
        }
    </script>
    <style>
        body { background: #2980b9; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; }
        .setup-card { background: white; color: #333; padding: 40px; border-radius: 10px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="setup-card">
        <h2>🚀 Bienvenido</h2>
        <p class="text-muted mb-4">Configura tu cuenta inicial para comenzar.</p>
        
        <form action="/setup_admin" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label">Nombre de Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: usuario1" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Tipo de Cuenta</label>
                <select name="role_request" id="rolSelect" class="form-select" onchange="toggleCodigo()">
                    <option value="user">🎓 Alumno (Estándar)</option>
                    <option value="admin">👑 Profesor (Administrador)</option>
                </select>
            </div>

            <div class="mb-4 text-start" id="divCodigoMaestro" style="display:none; background: #fff3cd; padding: 10px; border-radius: 5px; border: 1px solid #ffeeba;">
                <label class="form-label text-warning fw-bold">🔑 Código de Centro (Requerido)</label>
                <input type="password" name="codigo_maestro" id="codigoMaestro" class="form-control" placeholder="Solo personal autorizado">
                <small class="text-muted" style="font-size: 0.8em;">Pídelo al desarrollador o director.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">CREAR CUENTA</button>
        </form>
    </div>
</body>
</html>
