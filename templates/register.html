<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #ecf0f1; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-register { background: #3498db; color: white; width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; border: none; transition: 0.3s; }
        .btn-register:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h3 style="color: #2c3e50; font-weight: bold;">📝 Nuevo Alumno</h3>
        <p class="text-muted">Crea tu cuenta para acceder</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <div class="mb-3">
            <label class="form-label text-muted">Nombre de Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ej: PerezJuan" required autofocus>
        </div>
        
        <div class="mb-3">
            <label class="form-label text-muted">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted">Grupo o Clase</label>
            <input type="text" name="group_name" class="form-control" 
                   placeholder="Ej: 3BA, Matutino, Clase 1..." required autocomplete="off">
            <div class="form-text">Escribe el nombre exacto que te dio tu profesor.</div>
        </div>
        <button type="submit" class="btn-register">REGISTRARSE</button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{{ url_for('login') }}" class="text-decoration-none text-secondary">¿Ya tienes cuenta? Ingresar</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
